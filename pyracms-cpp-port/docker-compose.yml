# NOTE: This docker-compose.yml is for DEVELOPMENT ONLY
# For production:
# - Use Docker secrets or external environment files for credentials
# - Never commit production credentials to version control
# - Use strong, randomly generated passwords

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pyracms
      POSTGRES_PASSWORD: pyracms
      POSTGRES_DB: pyracms
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyracms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - network.host=0.0.0.0
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9299:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8099:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pyracms
      DB_USER: pyracms
      DB_PASSWORD: pyracms
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      JWT_SECRET: change-me-in-production
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Elasticsearch
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SEARCH_ENGINE: elasticsearch
      # OAuth (uncomment and fill in for OAuth support)
      # OAUTH_GITHUB_CLIENT_ID: ""
      # OAUTH_GITHUB_CLIENT_SECRET: ""
      # OAUTH_GOOGLE_CLIENT_ID: ""
      # OAUTH_GOOGLE_CLIENT_SECRET: ""
      # OAUTH_DISCORD_CLIENT_ID: ""
      # OAUTH_DISCORD_CLIENT_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3099:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8099
      API_URL: http://backend:8080
    depends_on:
      - backend

# To build code snippet runners:
# docker build -t pyracms-runner-python docker/python/
# docker build -t pyracms-runner-node docker/node/
# docker build -t pyracms-runner-cpp docker/cpp/
# docker build -t pyracms-runner-rust docker/rust/
# docker build -t pyracms-runner-go docker/go/
# docker build -t pyracms-runner-java docker/java/
# docker build -t pyracms-runner-ruby docker/ruby/
# Or use: python cli.py build --docker

volumes:
  postgres_data:
  redis_data:
  es_data:
